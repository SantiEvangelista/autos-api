[phases.setup]
nixPkgs = ["nodejs_20"]

# COMPOSER_NO_DEV=1 ensures dev dependencies (phpspreadsheet etc.) are excluded.
# Required because Railway's default composer install includes require-dev,
# and phpspreadsheet needs ext-gd which is not available in the Nixpacks PHP runtime.
[phases.install]
cmds = ["COMPOSER_NO_DEV=1 composer install --optimize-autoloader --no-interaction", "NODE_ENV=development npm ci"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "php artisan view:clear && php artisan migrate --force && php artisan optimize && php artisan serve --host=0.0.0.0 --port=8080"
