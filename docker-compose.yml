services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: subs_app
    environment:
      XDEBUG_MODE: ${XDEBUG_MODE:-off}
    volumes:
      - .:/var/www
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - subs_network
    depends_on:
      pgsql:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: subs_nginx
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - subs_network
    depends_on:
      - app

  pgsql:
    image: postgres:16-alpine
    container_name: subs_pgsql
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "54320:5432"
    volumes:
      - subs_pgsql_data:/var/lib/postgresql/data
    networks:
      - subs_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:alpine
    container_name: subs_redis
    ports:
      - "63790:6379"
    volumes:
      - subs_redis_data:/data
    networks:
      - subs_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: subs_queue
    environment:
      XDEBUG_MODE: "off"
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    volumes:
      - .:/var/www
    networks:
      - subs_network
    depends_on:
      pgsql:
        condition: service_healthy
      redis:
        condition: service_healthy

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: subs_scheduler
    environment:
      XDEBUG_MODE: "off"
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    volumes:
      - .:/var/www
    networks:
      - subs_network
    depends_on:
      pgsql:
        condition: service_healthy
      redis:
        condition: service_healthy

networks:
  subs_network:
    driver: bridge

volumes:
  subs_pgsql_data:
  subs_redis_data:
